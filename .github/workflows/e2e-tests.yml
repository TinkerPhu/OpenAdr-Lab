name: E2E Tests

on:
  workflow_dispatch:  # run manually via GitHub UI "Run workflow" button

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images with cache
        uses: docker/bake-action@v5
        with:
          workdir: tests
          files: docker-compose.test.yml
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
          load: true

      - name: Run E2E tests
        working-directory: tests
        run: docker compose -f docker-compose.test.yml run --rm test-runner

      - name: Tear down
        if: always()
        working-directory: tests
        run: docker compose -f docker-compose.test.yml down -v

  resilience:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: e2e  # run after main tests pass

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images with cache
        uses: docker/bake-action@v5
        with:
          workdir: tests
          files: docker-compose.test.yml
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
          load: true

      - name: Run resilience tests
        working-directory: tests
        run: docker compose -f docker-compose.test.yml run --rm test-runner --tags=@resilience

      - name: Tear down
        if: always()
        working-directory: tests
        run: docker compose -f docker-compose.test.yml down -v
