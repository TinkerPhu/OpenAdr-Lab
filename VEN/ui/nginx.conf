server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS and re-resolve every 10 s so VEN container
    # restarts don't leave nginx routing to stale IPs.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ven-1/ {
        set $upstream_ven1 ven-1;
        rewrite ^/api/ven-1/(.*) /$1 break;
        proxy_pass http://$upstream_ven1:8080;
        proxy_set_header Host $host;
    }

    location /api/ven-2/ {
        set $upstream_ven2 ven-2;
        rewrite ^/api/ven-2/(.*) /$1 break;
        proxy_pass http://$upstream_ven2:8080;
        proxy_set_header Host $host;
    }

    location /api/ven-3/ {
        set $upstream_ven3 ven-3;
        rewrite ^/api/ven-3/(.*) /$1 break;
        proxy_pass http://$upstream_ven3:8080;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
