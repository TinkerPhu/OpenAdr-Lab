server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS and re-resolve every 10 s so VEN container
    # restarts don't leave nginx routing to stale IPs.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ven-1/ {
        set $upstream_ven1 ven-1;
        rewrite ^/api/ven-1/(.*) /$1 break;
        proxy_pass http://$upstream_ven1:8080;
        proxy_set_header Host $host;
    }

    location /api/ven-2/ {
        set $upstream_ven2 ven-2;
        rewrite ^/api/ven-2/(.*) /$1 break;
        proxy_pass http://$upstream_ven2:8080;
        proxy_set_header Host $host;
    }

    location /api/ven-3/ {
        set $upstream_ven3 ven-3;
        rewrite ^/api/ven-3/(.*) /$1 break;
        proxy_pass http://$upstream_ven3:8080;
        proxy_set_header Host $host;
    }

    # Dynamic VEN discovery for the dropdown: the VTN's VEN registry via the
    # BFF, which holds the VenManager credential that GET /vens requires.
    location = /api/vens-registry {
        set $upstream_bff bff;
        proxy_pass http://$upstream_bff:8090/api/vens;
        proxy_set_header Host $host;
    }

    # Dynamic per-VEN proxy for VENs beyond the trio above (fleet instances):
    # venName == docker compose service name for both the seeded trio and
    # fleet VENs, so Docker DNS resolves the captured name directly.
    location ~ ^/api/dyn/(?<ven>[a-zA-Z0-9_-]+)/(?<rest>.*)$ {
        proxy_pass http://$ven:8080/$rest$is_args$args;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
