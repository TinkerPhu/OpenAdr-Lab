# VEN-1: Residential prosumer (EV + PV + Battery)
assets:
  - type: ev
    id: ev
    max_charge_kw: 7.4
    initial_soc: 0.40
    battery_kwh: 60.0
    soc_target: 0.80
  - type: pv
    id: pv
    rated_kw: 8.0
  - type: battery
    id: battery
    capacity_kwh: 10.0
    max_charge_kw: 5.0
    max_discharge_kw: 5.0
    initial_soc: 0.50
    round_trip_efficiency: 0.92
    min_soc: 0.10
  - type: base_load
    id: base_load
    baseline_kw: 0.4

simulator:
  tick_s: 1
  persist_every_s: 15
  report_interval_s: 60

planner:
  plan_adoption_threshold_eur: 0.20
  replan_interval_s: 300
  deviation_trigger_ticks: 120
  solver_timeout_s: 60
  planning_initial_delay_s: 5
  c_ctrl_imp_malus_eur_kwh: 0.22

absorber:
  enabled: true
  dead_band_kw: 0.1
  dead_band_clearing_ticks: 1
  assets:
    - id: battery
      priority: 0
      min_state_linger_s: 0
    - id: ev
      priority: 1
      min_state_linger_s: 0
      ev_departure_guard_s: 1800
