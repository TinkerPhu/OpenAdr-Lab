# VEN-2: Commercial building (Hot Water Tank + PV)
assets:
  - type: heater
    id: heater
    max_kw: 6.0           # full tier (0 / 3 / 6 kW hardware steps)
    mid_kw: 3.0           # mid tier
    temp_initial_c: 60.0
    temp_min_c: 40.0      # tank hysteresis lower bound
    temp_max_c: 80.0      # tank hysteresis upper bound
    volume_l: 2000.0
    k_loss_kw_per_c: 0.003
    draw_kw: 0.5
    switching_penalty_eur: 0.50
  - type: pv
    id: pv
    rated_kw: 12.0
  - type: base_load
    id: base_load
    baseline_kw: 0.5

simulator:
  tick_s: 1
  persist_every_s: 15
  report_interval_s: 60

planner:
  phase2_epsilon_eur: 0.10  # allow 10 ct slack so Phase 2 can smooth switching
  replan_interval_s: 300
  deviation_trigger_ticks: 120
  solver_timeout_s: 60
  planning_initial_delay_s: 5

absorber:
  enabled: true
  dead_band_kw: 0.1
  dead_band_clearing_ticks: 1
  assets:
    - id: heater
      priority: 0
      min_state_linger_s: 30
