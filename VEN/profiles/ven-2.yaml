# VEN-2: Commercial building (Hot Water Tank + PV)
assets:
  - type: heater
    id: heater
    max_kw: 6.0           # full tier (0 / 3 / 6 kW hardware steps)
    mid_kw: 3.0           # mid tier
    temp_initial_c: 60.0
    temp_min_c: 40.0      # tank hysteresis lower bound
    temp_max_c: 80.0      # tank hysteresis upper bound
    volume_l: 2000.0
    k_loss_kw_per_c: 0.003
    draw_kw: 0.5
    switching_penalty_eur: 0.50
  - type: pv
    id: pv
    rated_kw: 12.0
  - type: base_load
    id: base_load
    baseline_kw: 0.5

simulator:
  tick_s: 1
  persist_every_s: 15
  report_interval_s: 60

planner:
  phase2_epsilon_eur: 1.00          # = 2× switching_penalty_eur; Phase 2 can eliminate up to 2 switches
  plan_adoption_threshold_eur: 0.20 # require real improvement before replacing current plan
  plan_adoption_decay_s: 1500       # 5× replan_interval_s — allow eventual replacement of stale plans
  replan_interval_s: 300
  solver_timeout_s: 60
  planning_initial_delay_s: 5
  c_ctrl_imp_malus_eur_kwh: 0.22
  plan_step_s: 600                  # 10 min slots (was 5 min); keeps slot count at 288 on 48 h horizon
  plan_horizon_h: 48                # 48 h covers 2 solar windows for the 15.5 h-fill tank
