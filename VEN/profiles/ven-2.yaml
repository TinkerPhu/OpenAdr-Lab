# VEN-2: Commercial building (Heater + PV, delayed strategy)
assets:
  - type: heater
    id: heater
    max_kw: 5.0
    temp_initial_c: 20.0
    temp_min_c: 19.0
    temp_max_c: 23.0
  - type: pv
    id: pv
    rated_kw: 12.0
  - type: base_load
    id: base_load
    baseline_kw: 2.0

reactor:
  strategy: delayed
  delay_s: 60
  ramp_duration_s: 120
  compliance: 1.0
  price_low: 0.08
  price_high: 0.30

simulator:
  tick_s: 1
  persist_every_s: 15
  report_interval_s: 60
