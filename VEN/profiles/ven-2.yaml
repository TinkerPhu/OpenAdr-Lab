# VEN-2: Commercial building (Hot Water Tank + PV)
assets:
  - type: heater
    id: heater
    max_kw: 6.0           # full tier (0 / 3 / 6 kW hardware steps)
    mid_kw: 3.0           # mid tier
    temp_initial_c: 60.0
    temp_min_c: 40.0      # tank hysteresis lower bound
    temp_max_c: 80.0      # tank hysteresis upper bound
    volume_l: 2000.0
    k_loss_kw_per_c: 0.003
    draw_kw: 0.5
    switching_penalty_eur: 3.0            # unit: EUR/(switch·h); effective at 10-min slot: 3.0×(10/60) = 0.50 EUR/switch
  - type: pv
    id: pv
    rated_kw: 12.0
  - type: base_load
    id: base_load
    baseline_kw: 0.5
    spikes:
      - center_hour: 8.0
        amplitude_kw: 1.2
        duration_h: 0.25
        ramp_h: 0.03
        jitter_h: 0.2
        probability: 1.0
        weekdays: [0, 1, 2, 3, 4]      # coffee, weekdays
      - center_hour: 12.0
        amplitude_kw: 2.0
        duration_h: 0.5
        ramp_h: 0.05
        jitter_h: 0.25
        probability: 1.0
        weekdays: [0, 1, 2, 3, 4]      # lunch, weekdays
      - center_hour: 18.0
        amplitude_kw: 2.5
        duration_h: 0.75
        ramp_h: 0.08
        jitter_h: 0.3
        probability: 1.0
        weekdays: [0, 1, 2, 3, 4]      # dinner, weekdays
      - center_hour: 10.5
        amplitude_kw: 2.2
        duration_h: 1.0
        ramp_h: 0.1
        jitter_h: 0.5
        probability: 1.0
        weekdays: [5, 6]               # brunch, weekend
      - center_hour: 17.0
        amplitude_kw: 2.5
        duration_h: 0.83
        ramp_h: 0.08
        jitter_h: 0.3
        probability: 1.0
        weekdays: [5, 6]               # dinner, weekend (earlier than weekday)
      - center_hour: 20.0
        amplitude_kw: 0.4
        duration_h: 3.0
        ramp_h: 0.2
        jitter_h: 0.5
        probability: 1.0
        weekdays: []                    # TV/lights, every day

simulator:
  tick_s: 1
  persist_every_s: 15
  report_interval_s: 60

planner:
  # replan_interval_s: 300        # default
  # solver_timeout_s: 60          # default
  # planning_initial_delay_s: 5   # default
  # plan_step_s: 600              # default (10 min slots, 288 slots over 48 h)
  # plan_horizon_h: 48            # default — 2 solar windows for the 15.5 h-fill tank
  # c_ctrl_imp_malus_eur_kwh: 0.22  # default
  # plan_adoption_threshold_eur: 0.20  # default
  # plan_adoption_decay_s: 1500   # default
  phase2_epsilon_eur: 1.00          # = 2× effective switching cost (3.0 × 10/60 = 0.50 EUR/switch)
  gate_switch_penalty_eur: 0.50     # per-extra-switch surcharge = effective switching cost (3.0 × 10/60)
  plan_zones:
    - step_s: 300
      slots: 96   # 8 h at 5-min resolution
    - step_s: 600
      slots: 96   # 16 h at 10-min resolution
    - step_s: 900
      slots: 96   # 24 h at 15-min resolution
