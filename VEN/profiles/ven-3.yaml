# VEN-3: Full mix (EV + Heater + PV)
assets:
  - type: ev
    id: ev
    max_charge_kw: 11.0
    initial_soc: 0.30
    battery_kwh: 75.0
  - type: heater
    id: heater
    max_kw: 6.0           # full tier (0 / 3 / 6 kW hardware steps)
    mid_kw: 3.0           # mid tier
    temp_initial_c: 50.0
    temp_min_c: 45.0
    temp_max_c: 60.0
    volume_l: 200.0
    k_loss_kw_per_c: 0.005
    draw_kw: 0.3
    switching_penalty_eur: 0.50
  - type: pv
    id: pv
    rated_kw: 6.0
  - type: base_load
    id: base_load
    baseline_kw: 0.6
    spikes:
      - center_hour: 8.0
        amplitude_kw: 1.2
        duration_h: 0.25
        ramp_h: 0.03
        jitter_h: 0.2
        probability: 1.0
        weekdays: [0, 1, 2, 3, 4]      # coffee, weekdays
      # ven-3 skips lunch cooking about 40% of the time (out at work) —
      # demonstrates per-household routine variety via `probability`.
      - center_hour: 12.0
        amplitude_kw: 2.0
        duration_h: 0.5
        ramp_h: 0.05
        jitter_h: 0.25
        probability: 0.6
        weekdays: [0, 1, 2, 3, 4]      # lunch, weekdays
      - center_hour: 18.0
        amplitude_kw: 2.5
        duration_h: 0.75
        ramp_h: 0.08
        jitter_h: 0.3
        probability: 1.0
        weekdays: [0, 1, 2, 3, 4]      # dinner, weekdays
      - center_hour: 10.5
        amplitude_kw: 2.2
        duration_h: 1.0
        ramp_h: 0.1
        jitter_h: 0.5
        probability: 1.0
        weekdays: [5, 6]               # brunch, weekend
      - center_hour: 17.0
        amplitude_kw: 2.5
        duration_h: 0.83
        ramp_h: 0.08
        jitter_h: 0.3
        probability: 1.0
        weekdays: [5, 6]               # dinner, weekend (earlier than weekday)
      - center_hour: 20.0
        amplitude_kw: 0.4
        duration_h: 3.0
        ramp_h: 0.2
        jitter_h: 0.5
        probability: 1.0
        weekdays: []                    # TV/lights, every day

simulator:
  tick_s: 1
  persist_every_s: 15
  report_interval_s: 60

planner:
  # replan_interval_s: 300        # default
  # solver_timeout_s: 60          # default
  # planning_initial_delay_s: 5   # default
  # plan_step_s: 600              # default (10 min slots, 288 slots over 48 h)
  # plan_horizon_h: 48            # default
  # c_ctrl_imp_malus_eur_kwh: 0.22  # default
  # plan_adoption_threshold_eur: 0.20  # default
  # plan_adoption_decay_s: 1500   # default
  phase2_epsilon_eur: 0.17          # = 2× effective switching cost (0.50 × 10/60 ≈ 0.083 EUR/switch)
  plan_zones:
    - step_s: 300
      slots: 96   # 8 h at 5-min resolution
    - step_s: 600
      slots: 96   # 16 h at 10-min resolution
    - step_s: 900
      slots: 96   # 24 h at 15-min resolution

# Weather-sourced PV forecast (docs/plans/weather-forecast-plugin.md).
# 8 kWp hypothetical array at the same Zunzgen site/geometry as ven-1
# (which uses the real 14.4 kWp installation as calibration reference) —
# kept smaller here intentionally for cross-VEN comparison. performance_ratio
# reuses ven-1's calibrated value (see its profile comment) since it's a
# site electrical-loss factor, not size-dependent.
weather_pv:
  latitude_deg: 47.4491
  longitude_deg: 7.8081
  tilt_deg: 22.0
  azimuth_deg: 267.0
  rated_kwp: 8.0
  performance_ratio: 0.84
