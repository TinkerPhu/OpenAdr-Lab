# VEN-3: Full mix (EV + Heater + PV)
assets:
  - type: ev
    id: ev
    max_charge_kw: 11.0
    initial_soc: 0.30
    battery_kwh: 75.0
  - type: heater
    id: heater
    max_kw: 6.0           # full tier (0 / 3 / 6 kW hardware steps)
    mid_kw: 3.0           # mid tier
    temp_initial_c: 50.0
    temp_min_c: 45.0
    temp_max_c: 60.0
    volume_l: 200.0
    k_loss_kw_per_c: 0.005
    draw_kw: 0.3
    switching_penalty_eur: 0.50
  - type: pv
    id: pv
    rated_kw: 6.0
  - type: base_load
    id: base_load
    baseline_kw: 0.6

simulator:
  tick_s: 1
  persist_every_s: 15
  report_interval_s: 60

planner:
  phase2_epsilon_eur: 5.0
  replan_interval_s: 300
  deviation_trigger_ticks: 120
  plan_adoption_threshold_eur: 0.05
  plan_adoption_decay_s: 1200
  solver_timeout_s: 60
  planning_initial_delay_s: 5
  c_ctrl_imp_malus_eur_kwh: 0.22

absorber:
  enabled: true
  dead_band_kw: 0.1
  dead_band_clearing_ticks: 1
  assets:
    - id: ev
      priority: 0
      min_state_linger_s: 0
      ev_departure_guard_s: 1800
    - id: heater
      priority: 1
      min_state_linger_s: 30
