# VEN-3: Full mix (EV + Heater + PV)
assets:
  - type: ev
    id: ev
    max_charge_kw: 11.0
    initial_soc: 0.30
    battery_kwh: 75.0
  - type: heater
    id: heater
    max_kw: 3.0
    temp_initial_c: 21.0
    temp_min_c: 18.0
    temp_max_c: 22.0
  - type: pv
    id: pv
    rated_kw: 6.0
  - type: base_load
    id: base_load
    baseline_kw: 0.8

simulator:
  tick_s: 1
  persist_every_s: 15
  report_interval_s: 60
