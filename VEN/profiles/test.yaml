# Test profile: All devices including battery, instant compliance, fast persist
assets:
  - type: ev
    id: ev
    max_charge_kw: 7.0
    initial_soc: 0.05
    battery_kwh: 60.0
  - type: heater
    id: heater
    max_kw: 3.0
    temp_initial_c: 20.0
    temp_min_c: 18.0
    temp_max_c: 23.0
  - type: pv
    id: pv
    rated_kw: 5.0
  - type: battery
    id: battery
    capacity_kwh: 10.0
    max_charge_kw: 5.0
    max_discharge_kw: 5.0
    initial_soc: 0.50
    round_trip_efficiency: 0.92
    min_soc: 0.10
  - type: base_load
    id: base_load
    baseline_kw: 0.5

simulator:
  tick_s: 1
  persist_every_s: 10
  report_interval_s: 10

planner:
  plan_step_s: 3600
  plan_horizon_h: 24
  replan_interval_s: 20
  deviation_trigger_ticks: 60

absorber:
  enabled: true
  dead_band_kw: 0.1
  dead_band_clearing_ticks: 1
  assets:
    - id: battery
      priority: 0
      min_state_linger_s: 0
    - id: ev
      priority: 1
      min_state_linger_s: 0
      ev_departure_guard_s: 1800
    - id: heater
      priority: 2
      min_state_linger_s: 0

packets:
  - asset: ev
    target_soc: 0.80
    latest_end_h: 12.0
    comfort_rates:
      - fill: 0.0
        bid: 0.50
      - fill: 1.0
        bid: 0.05
