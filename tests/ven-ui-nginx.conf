server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ven-1/ {
        proxy_pass http://test-ven-1:8080/;
        proxy_set_header Host $host;
    }

    location /api/ven-2/ {
        proxy_pass http://test-ven-2:8080/;
        proxy_set_header Host $host;
    }

    location /api/ven-3/ {
        proxy_pass http://test-ven-1:8080/;
        proxy_set_header Host $host;
    }

    # Docker's embedded DNS — required for the variable-based proxy_pass below.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Dynamic VEN discovery (dropdown): registry via the test BFF. In the test
    # stack all registered venNames (ven-1..3) are already dropdown defaults,
    # so no dynamic entries appear — this exists for parity with the
    # production conf and so the UI's registry fetch doesn't 404.
    location = /api/vens-registry {
        set $upstream_bff test-bff;
        proxy_pass http://$upstream_bff:8090/api/vens;
        proxy_set_header Host $host;
    }

    # Dynamic per-VEN proxy (unused in the test stack — venNames don't match
    # the test-* service names here — but kept identical to production).
    location ~ ^/api/dyn/(?<ven>[a-zA-Z0-9_-]+)/(?<rest>.*)$ {
        proxy_pass http://$ven:8080/$rest$is_args$args;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
