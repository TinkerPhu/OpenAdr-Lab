server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ven-1/ {
        proxy_pass http://test-ven-1:8080/;
        proxy_set_header Host $host;
    }

    location /api/ven-2/ {
        proxy_pass http://test-ven-2:8080/;
        proxy_set_header Host $host;
    }

    location /api/ven-3/ {
        proxy_pass http://test-ven-1:8080/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
