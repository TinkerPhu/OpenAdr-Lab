###############################################################################
# OpenADR 3 Integration Test Stack
#
# Self-contained test environment: DB + VTN + VEN + test-runner
# No published ports — no conflict with production stack.
#
# Usage (on Pi):
#   cd /srv/docker/openadr_lab
#   docker compose -f tests/docker-compose.test.yml up --build \
#     --abort-on-container-exit --exit-code-from test-runner
#   docker compose -f tests/docker-compose.test.yml down
###############################################################################

name: openadr-test

services:
  # ---------------------------------------------------------------------------
  # Ephemeral PostgreSQL (no volume — destroyed on `down`)
  # ---------------------------------------------------------------------------
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openadr
      POSTGRES_DB: openadr
      POSTGRES_PASSWORD: openadr
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openadr"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - test-net

  # ---------------------------------------------------------------------------
  # VTN — openleadr-rs (auto-migrates on first boot)
  # ---------------------------------------------------------------------------
  test-vtn:
    build:
      context: ../openleadr-rs
      dockerfile: vtn.Dockerfile
    environment:
      RUST_LOG: info
      DATABASE_URL: postgres://openadr:openadr@test-db:5432/openadr
    healthcheck:
      test: curl --fail http://127.0.0.1:3000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      test-db:
        condition: service_healthy
    networks:
      - test-net

  # ---------------------------------------------------------------------------
  # VEN — single instance with fast polling (5s) for test speed
  # Starts before fixtures; poll retry handles initial auth failures.
  # ---------------------------------------------------------------------------
  test-ven-1:
    build:
      context: ../VEN
      dockerfile: Dockerfile
    environment:
      LISTEN_ADDR: "0.0.0.0:8080"
      VTN_BASE_URL: "http://test-vtn:3000"
      CLIENT_ID: "ven-1"
      CLIENT_SECRET: "ven-1"
      VEN_NAME: "ven-1"
      POLL_EVENTS_SECS: "5"
      POLL_PROGRAMS_SECS: "5"
      RUST_LOG: "info"
    healthcheck:
      test: curl --fail http://127.0.0.1:8080/health || exit 1
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      test-vtn:
        condition: service_healthy
    networks:
      - test-net

  # ---------------------------------------------------------------------------
  # Test runner — loads fixtures via psql, then runs behave
  # ---------------------------------------------------------------------------
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      VTN_BASE_URL: "http://test-vtn:3000"
      VEN_BASE_URL: "http://test-ven-1:8080"
    volumes:
      - ../openleadr-rs/fixtures:/fixtures:ro
    depends_on:
      test-vtn:
        condition: service_healthy
      test-ven-1:
        condition: service_healthy
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
